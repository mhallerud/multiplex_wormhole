[project]
name = "multiplex_wormhole"
version = "1.0.0"
authors = [
	{ name="Maggie Hallerud, email="hallerum@oregonstate.edu" },
]
description = "In silico optimization for multiplex PCR primer design for targeted sequencing applications"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [ "MFEprimer-3.2" ]
classifiers = [
    "Programming Language :: Python :: 3.9",
    "Operating System :: MacOS, Unix, Linux",
    "Development Status :: 4 - Beta",
    "Natural Language :: English",

    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Bio-Informatics"
]
license = "GNU GENERAL PUBLIC LICENSE version 3"
license-files = ["LICENSE"]
keywords = ["multiplex PCR", "bioinformatics", "SNP panel"]

[project.urls]
Homepage = "https://github.com/mhallerud/multiplex_wormhole"
Issues = "https://github.com/mhallerud/multiplex_wormhole/issues"
Documentation = "TBD"

