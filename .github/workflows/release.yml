name: Publish Python 🐍 distribution 📦 to PyPI

on: #push
  workflow_dispatch:
    required: true
    default: 'staging'
    version: 1.0.0
    description: 'New version'

jobs:
# define the build for the distribution
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.9"
  # define options for using build package
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v5
      with:
        name: python-package-distributions
        path: dist/
        

  # define workflow job environment for PyPi
  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/multiplex_wormhole  # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    # steps for actively publishing to pypi
    steps:
    - name: Download all the dists
    # downloads stored distribution
      uses: actions/download-artifact@v6
      with:
        name: python-package-distributions
        path: dist/
    # uploads to PyPi unconditionally
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
